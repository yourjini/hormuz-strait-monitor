<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#132d4a"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="300" x2="0" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a5276" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2a7ab5" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Sea shimmer -->
  <rect x="0" y="320" width="1200" height="310" fill="url(#sea)" rx="0"/>

  <!-- Wave lines -->
  <path d="M0 380 Q200 360 400 380 Q600 400 800 380 Q1000 360 1200 380" stroke="#06b6d4" stroke-opacity="0.15" stroke-width="2" fill="none"/>
  <path d="M0 420 Q200 400 400 420 Q600 440 800 420 Q1000 400 1200 420" stroke="#06b6d4" stroke-opacity="0.1" stroke-width="2" fill="none"/>
  <path d="M0 460 Q200 440 400 460 Q600 480 800 460 Q1000 440 1200 460" stroke="#06b6d4" stroke-opacity="0.07" stroke-width="2" fill="none"/>

  <!-- Alert badge -->
  <circle cx="180" cy="200" r="60" fill="#ef4444" opacity="0.9"/>
  <text x="180" y="220" text-anchor="middle" fill="white" font-size="60" font-weight="bold" font-family="Arial">!</text>

  <!-- Main title -->
  <text x="280" y="195" fill="#ffffff" font-size="64" font-weight="bold" font-family="Arial, sans-serif">HORMUZ STRAIT</text>
  <text x="280" y="260" fill="#06b6d4" font-size="52" font-weight="bold" font-family="Arial, sans-serif">MONITOR</text>

  <!-- Divider -->
  <line x1="120" y1="300" x2="1080" y2="300" stroke="#1e3a5f" stroke-width="2"/>

  <!-- Korean subtitle -->
  <text x="600" y="370" text-anchor="middle" fill="#e2e8f0" font-size="36" font-family="Arial, sans-serif">호르무즈 해협 봉쇄 실시간 모니터링</text>

  <!-- Feature pills -->
  <rect x="200" y="410" width="200" height="50" rx="25" fill="#1e3a5f"/>
  <text x="300" y="443" text-anchor="middle" fill="#f59e0b" font-size="22" font-weight="bold" font-family="Arial">⛽ 유가 영향</text>

  <rect x="440" y="410" width="200" height="50" rx="25" fill="#1e3a5f"/>
  <text x="540" y="443" text-anchor="middle" fill="#06b6d4" font-size="22" font-weight="bold" font-family="Arial">💱 환율 변동</text>

  <rect x="680" y="410" width="240" height="50" rx="25" fill="#1e3a5f"/>
  <text x="800" y="443" text-anchor="middle" fill="#22c55e" font-size="22" font-weight="bold" font-family="Arial">🧮 내 지갑 계산기</text>

  <!-- Bottom info -->
  <text x="600" y="540" text-anchor="middle" fill="#64748b" font-size="20" font-family="Arial, sans-serif">봉쇄 현황 · 유가/환율 영향 · 산업별 타격 · 내 지갑 계산기</text>

  <!-- URL -->
  <text x="600" y="590" text-anchor="middle" fill="#475569" font-size="18" font-family="Arial, sans-serif">hormuz-monitor-nine.vercel.app</text>
</svg>
